cloud:
  provider: groq
  api_key_env: GROQ_API_KEY
  base_url: https://api.groq.com/openai/v1
  model: llama-3.3-70b-versatile
  temperature: 0.2
  max_tokens: 1024
  timeout: 420

device:
  provider: ollama          # ollama | vllm
  model: llama3:latest
  base_url: http://localhost:11434
  max_tokens: 200
  temperature: 0.1
  num_gpu: -1               # -1 = use all GPU layers (Ollama)
  memory_mb: 8192           # reported in metrics Table III

# Set false to use real Cloud API + local GPU Device LLM
use_mock: false

cache_responses: true
cache_dir: .llm_cache

