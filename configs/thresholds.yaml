# Distance and communication constraints (Eqs 4-7, 23)
C1: 50.0              # communication range (meters)
C_task: 30.0          # subtask collaboration range (meters)
R_reach: 100.0        # agent reach to subtask target (meters)
C2: 5.0               # collision avoidance threshold (meters)

# CQM weights (Eq 18)
cqi_weights:
  w1: 0.4             # packet loss weight
  w2: 0.35            # latency weight
  w3: 0.25            # bandwidth weight

# CQM calibration bounds
latency:
  tau_min: 0.01       # seconds (stable baseline)
  tau_max: 2.0        # seconds (degraded baseline)
bandwidth_window: 10 
packet_loss_window: 20 # W_B sliding window size

# ACDS hysteresis thresholds (Eqs 20-21)
acds:
  cqi_crossover: 0.65
  delta: 0.04        # hysteresis band half-width
  persistence_window: 4  # N consecutive intervals

# Coalition feasibility (Eqs 24-25)
gamma_min: 0.3
# Hierarchical planning policy thresholds
planning_similarity_threshold: 0.85   # cosine-like overlap needed to reuse a cached cloud plan
maximum_cached_plan_age: 15           # steps; force refresh even if similar
minimum_replanning_interval: 3        # steps; suppress re-triggering within this window (except architecture switch)
minimum_state_change: 0.05            # fraction of subtasks/agents that must differ to count as "changed"
communication_change_threshold: 0.08  # reused as cqi_delta_threshold, now named per spec


# Agent kinematics
kinematics:
  uav:
    max_speed: 15.0
    max_turn_rate: 1.5
  vehicle:
    max_speed: 10.0
    max_turn_rate: 0.8
  robot:
    max_speed: 3.0
    max_turn_rate: 2.0

# CA transfer overlap window (Eq 30)
ca_overlap_delta: 3   # timesteps

# Scenarios
scenarios:
  logistics:
    num_uav: 3
    num_vehicle: 2
    num_robot: 2
    num_subtasks: 6
    comm_delay_prob: 0.0
    packet_loss_rate: 0.0
  inspection:
    num_uav: 4
    num_vehicle: 2
    num_robot: 3
    num_subtasks: 8
    comm_delay_prob: 0.10
    packet_loss_rate: 0.01
  search_rescue:
    num_uav: 5
    num_vehicle: 3
    num_robot: 4
    num_subtasks: 10
    comm_delay_prob: 0.05
    packet_loss_rate: 0.005


# CA transfer overlap window (Eq 30)
ca_overlap_delta: 3   # timesteps

# Goal 1: lightweight network realism
network:
  communication_range: 50
  good_range: 20
  medium_range: 40
  wireless_jitter: 0.05
  oscillation_period: 60        # steps per congestion/recovery cycle
  base_quality: 0.75            # mean channel quality (dimensionless, [0,1])
  quality_amplitude: 0.20       # macro-cycle swing around base_quality
  distance_quality_floor: 0.5   # multi-hop relay floor; distance attenuates, never severs
  interference_dip_factor: 0.6  # temporary multiplicative dip during interference windows
  fading_correlation: 0.85      # AR(1) coherence -- higher = smoother fading
  environment_factor:
    warehouse: 1.0
    urban: 1.15
    disaster: 1.35

# Goal 2: lightweight battery model (movement-proportional drain, speed cut only)
battery:
  enabled: false
  drain_rate: 0.002
  low_threshold: 20
  low_speed_factor: 0.8

# Goal 3: occasional dynamic scenario events
scenario:
  communication_events: true
  priority_update_probability: 0.10

